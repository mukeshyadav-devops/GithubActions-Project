name: Build-Push-Deploy

on:
  push:
    branches: ["master"]

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build with Maven
        run: mvn -B package

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/java-docker-app:latest .

      - name: Push Docker Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/java-docker-app:latest

      - name: Deploy to EC2 container via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/java-docker-app:latest

            # Stop and remove existing container if it exists
            docker stop java-docker-app || true
            docker rm java-docker-app || true

            # Run the container
            docker run -d -p 8080:8080 --name java-docker-app ${{ secrets.DOCKER_USERNAME }}/java-docker-app:latest

            # Show running containers
            docker ps
